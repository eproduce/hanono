name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── 第一步：release-please 自动版本管理 ──
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

  # ── 第二步：全平台构建（仅 release-please 创建新版本时触发）──
  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin

          - platform: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin

          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''

          - platform: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            args: ''

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          rustup target add x86_64-apple-darwin aarch64-apple-darwin 2>/dev/null || true

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.release-please.outputs.tag_name }}
          releaseName: 'Hanono v__VERSION__'
          releaseBody: 'See [CHANGELOG.md](./CHANGELOG.md) for details.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
