name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── release-please：自动版本管理 + CHANGELOG ──
  release-please:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

  # ── 自动合并 release PR ──
  auto-merge-release-pr:
    needs: release-please
    if: needs.release-please.outputs.pr != ''
    runs-on: ubuntu-latest
    steps:
      - name: Auto-merge release PR
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ needs.release-please.outputs.pr }}"
          TAG="${{ needs.release-please.outputs.tag_name }}"
          echo "Auto-merging release PR #${PR_NUM} (tag: ${TAG})"
          gh pr merge "${PR_NUM}" --squash --delete-branch --subject "chore: release ${TAG}" || echo "⚠️ Auto-merge failed (may need manual merge)"

  # ── 全平台构建 + 发布（仅在 tag 推送或手动触发时）──
  build:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin

          - platform: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin

          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''

          - platform: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            args: ''

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          rustup target add x86_64-apple-darwin aarch64-apple-darwin 2>/dev/null || true

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        shell: bash
        run: npx tauri build ${{ matrix.args }}

      - name: List built artifacts
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          [ -d "$BUNDLE_DIR" ] || BUNDLE_DIR="src-tauri/target/release/bundle"
          echo "=== Built files in $BUNDLE_DIR ==="
          find "$BUNDLE_DIR" -maxdepth 2 -type f 2>/dev/null || echo "No bundle dir"

      - name: Package Windows portable (zip)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          REL_DIR="src-tauri/target/${{ matrix.target }}/release"
          [ -d "$REL_DIR" ] || REL_DIR="src-tauri/target/release"
          PORTABLE_DIR="hanono-portable"
          mkdir -p "$PORTABLE_DIR"
          # Copy the exe and webview2 loader (if bundled)
          cp "$REL_DIR/hanono.exe" "$PORTABLE_DIR/" 2>/dev/null || true
          cp "$REL_DIR/"*.dll "$PORTABLE_DIR/" 2>/dev/null || true
          # Create zip
          zip -r "src-tauri/target/release/bundle/Hanono_${{ github.ref_name }}_x64_portable.zip" "$PORTABLE_DIR"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Determine correct bundle directory
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          [ -d "$BUNDLE_DIR" ] || BUNDLE_DIR="src-tauri/target/release/bundle"

          # Create release if not exists (idempotent)
          gh release create "${{ github.ref_name }}" \
            --title "Hanono ${{ github.ref_name }}" \
            --notes "See [CHANGELOG.md](./CHANGELOG.md) for details." \
            --draft=false --prerelease=false \
            2>/dev/null || true

          # Upload only the top-level bundle files (dmg/deb/rpm/AppImage/msi/exe)
          find "$BUNDLE_DIR" -maxdepth 2 -type f \
            \( -name "*.dmg" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.exe" \) \
            | while read f; do
            echo "Uploading: $f"
            gh release upload "${{ github.ref_name }}" "$f" --clobber
          done

